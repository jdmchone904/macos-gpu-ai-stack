apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llama-cpp.fullname" . }}
  labels: {{- include "llama-cpp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "llama-cpp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "llama-cpp.selectorLabels" . | nindent 8 }}
    spec:
      # Add security context for GPU access
      securityContext:
        runAsUser: 0     # Run as root for GPU access
        runAsGroup: 0
        fsGroup: 0
      initContainers:
        - name: model-downloader
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              MODEL_FILE="/models/{{ .Values.model.filename }}"
              
              if [ ! -f "$MODEL_FILE" ]; then
                echo "Downloading {{ .Values.model.filename }} from {{ .Values.model.hf_repo }}..."
                
                # Download the bartowski GGUF model
                curl -L "https://huggingface.co/{{ .Values.model.hf_repo }}/resolve/main/{{ .Values.model.filename }}" \
                  -o "$MODEL_FILE" \
                  --fail \
                  --progress-bar \
                  --create-dirs || {
                    echo "Download failed for {{ .Values.model.filename }}"
                    echo "Check if file exists at: https://huggingface.co/{{ .Values.model.hf_repo }}/tree/main"
                    exit 1
                  }
                
                if [ -f "$MODEL_FILE" ] && [ -s "$MODEL_FILE" ]; then
                  echo "Model downloaded successfully!"
                  echo "File: $(ls -lh $MODEL_FILE)"
                  echo "Size: $(du -h $MODEL_FILE | cut -f1)"
                else
                  echo "Download failed or file is empty"
                  exit 1
                fi
              else
                echo "Model already exists: $(ls -lh $MODEL_FILE)"
              fi
          volumeMounts:
            - name: model-storage
              mountPath: /models
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi
      containers:
        - name: llama-cpp-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true  # Required for GPU access
            capabilities:
              add:
                - SYS_ADMIN
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          command: ["sh", "-c"]
          args:
            - |
              echo "Starting llama.cpp server with GPU support..."
              echo "Current user: $(whoami) ($(id))"
              echo "GPU devices:"
              ls -la /dev/dri/ 2>/dev/null || echo "No /dev/dri found"
              echo "GPU device permissions:"
              ls -la /dev/dri/renderD128 2>/dev/null || echo "renderD128 not found"
              
              echo "Testing GPU access (with timeout):"
              timeout 5 sh -c 'dd if=/dev/dri/renderD128 of=/dev/null bs=1 count=1' 2>/dev/null && echo "GPU access: OK" || echo "GPU access: FAILED or TIMEOUT"
              
              echo "Checking Vulkan:"
              vulkaninfo --summary 2>/dev/null | head -10 || echo "Vulkan check failed"
              
              echo "Starting server with model: {{ .Values.model.filename }}"
              
              # Start llama.cpp server with GPU support
              llama-server \
                --model /models/{{ .Values.model.filename }} \
                --host ${SERVER_HOST:-0.0.0.0} \
                --port ${SERVER_PORT:-8080} \
                --n-gpu-layers ${GPU_LAYERS:-999} \
                --ctx-size ${CONTEXT_SIZE:-8192} \
                --threads ${THREADS:-8} \
                --{{ .Values.log.level }}
                --jinja
          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: dev-dri
              mountPath: /dev/dri
            - name: sys-dev
              mountPath: /sys/dev
              readOnly: true
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: "{{ .value }}"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.httpGet.path }}
              port: {{ .Values.startupProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health  
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: {{ include "llama-cpp.fullname" . }}-pvc
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: DirectoryOrCreate
        - name: sys-dev
          hostPath:
            path: /sys/dev
            type: Directory