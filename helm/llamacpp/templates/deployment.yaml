apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llamacpp.fullname" . }}
  labels:
    {{- include "llamacpp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "llamacpp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llamacpp.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        supplementalGroups: {{ .Values.podSecurityContext.supplementalGroups | toJson }}

      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "llamacpp.fullname" .) }}
      {{- end }}

      initContainers:
        - name: fix-dri-permissions
          image: busybox
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              chown root:video /dev/dri/card0 && chmod 660 /dev/dri/card0
              chown root:render /dev/dri/renderD128 && chmod 666 /dev/dri/renderD128
              echo "DRI permissions fixed"
              ls -la /dev/dri/
          volumeMounts:
            - name: dev-dri
              mountPath: /dev/dri

        - name: wait-for-models
          image: busybox
          command:
            - sh
            - -c
            - |
              {{- range .Values.models }}
              echo "Waiting for /models/{{ .filename }}..."
              until [ -f "/models/{{ .filename }}" ]; do
                echo "  not yet present — sleeping 10s"
                sleep 10
              done
              echo "Found: {{ .filename }}"
              {{- end }}
          volumeMounts:
            - name: model-storage
              mountPath: /models

      containers:
        - name: llamacpp-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: {{ .Values.securityContext.privileged }}
            capabilities:
              add: {{ .Values.securityContext.capabilities.add | toJson }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          command: ["llama-server"]
          args:
            - "--models-dir"
            - "/models"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "{{ .Values.service.port }}"
            - "--n-gpu-layers"
            - "{{ .Values.server.gpuLayers }}"
            - "--ctx-size"
            - "{{ .Values.server.contextSize }}"
            - "--threads"
            - "{{ .Values.server.threads }}"
            - "--log-verbosity"
            - "{{ .Values.log.verbosity }}"
            - "--jinja"

          env:
            - name: GGML_VK_DEVICE
              value: "0"
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}

          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: dev-dri
              mountPath: /dev/dri
            - name: sys-dev
              mountPath: /sys/dev
              readOnly: true

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.httpGet.path }}
              port: {{ .Values.startupProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 6 }}
          {{- end }}

          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds | default 15 }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds | default 3 }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold | default 3 }}
          {{- end }}

      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: {{ include "llamacpp.fullname" . }}-pvc
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: DirectoryOrCreate
        - name: sys-dev
          hostPath:
            path: /sys/dev
            type: Directory

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}