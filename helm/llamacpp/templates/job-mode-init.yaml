{{- if .Values.models }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "llamacpp.fullname" . }}-model-loader
  labels:
    {{- include "llamacpp.labels" . | nindent 4 }}
    app.kubernetes.io/component: model-loader
  annotations:
    "helm.sh/hook":               post-install,post-upgrade
    "helm.sh/hook-weight":        "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.modelDownloadBackoffLimit | default 3 }}
  activeDeadlineSeconds: {{ mul (len .Values.models) (.Values.modelTimeoutSeconds | default 3600) }}
  template:
    metadata:
      labels:
        {{- include "llamacpp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: model-loader
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: model-loader
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail

              {{- range .Values.models }}
              MODEL_FILE="/models/{{ .filename }}"
              if [ -f "$MODEL_FILE" ] && [ -s "$MODEL_FILE" ]; then
                echo "Already present — skipping: {{ .filename }}"
              else
                echo "Downloading {{ .filename }} from {{ .hf_repo }}..."
                curl -L \
                  --fail \
                  --retry 5 \
                  --retry-delay 15 \
                  --retry-connrefused \
                  --progress-bar \
                  "https://huggingface.co/{{ .hf_repo }}/resolve/main/{{ .filename }}" \
                  -o "${MODEL_FILE}.tmp" 2>&1
                mv "${MODEL_FILE}.tmp" "$MODEL_FILE"
                echo "Done: $(du -sh $MODEL_FILE | cut -f1) — {{ .filename }}"
              fi

              {{- end }}
              echo "All models ready."

          volumeMounts:
            - name: model-storage
              mountPath: /models

          resources:
            {{- toYaml .Values.jobResources | nindent 12 }}

      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: {{ include "llamacpp.fullname" . }}-pvc
{{- end }}